name: Format

on:
  # https://securitylab.github.com/resources/github-actions-preventing-pwn-requests/
  pull_request_target:
    paths:
      - "**.editorconfig"
      - "**.globalconfig"
      - "**.cs"
      - .github/workflows/formatter.yml

permissions: {}
concurrency: ${{ github.workflow }}-${{ github.head_ref }}
env:
  BRANCH: ${{ github.head_ref }}

jobs:
  format:
    runs-on: ubuntu-slim

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v5.1.0

      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          show-progress: false
          persist-credentials: false
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}

      - name: Format scripts
        run: dotnet format whitespace --no-restore

      - name: Create format patch
        run: git diff -- "*.cs" > format.patch

      - name: Upload patch
        uses: actions/upload-artifact@v7.0.0
        with:
          name: format-patch
          path: format.patch

  push:
    needs: format
    runs-on: ubuntu-slim
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          show-progress: false
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ env.BRANCH }}

      - name: Download patch
        uses: actions/download-artifact@v8.0.0
        with:
          pattern: format-patch

      - name: Set Git config
        run: |
          git config user.name octocat
          git config user.email octocat@users.noreply.github.com

      - name: Commit changes
        run: |
          git apply format.patch || true
          git commit -am "style: fix whitespaces" || true
          git push origin HEAD:$BRANCH
